Environments:
  type: object
  required:
    - dev
    - staging
    - prod
  properties:
    dev:
      type: boolean
      description: Flag state in dev environment
    staging:
      type: boolean
      description: Flag state in staging environment
    prod:
      type: boolean
      description: Flag state in prod environment

CreateFlagRequest:
  type: object
  required:
    - flagKey
    - description
    - environments
  properties:
    flagKey:
      type: string
      minLength: 1
      maxLength: 100
      pattern: '^[a-zA-Z0-9_-]+$'
      description: Unique identifier for the flag
    description:
      type: string
      minLength: 1
      maxLength: 500
      description: Human readable description of the flag
    environments:
      $ref: '#/Environments'

UpdateFlagRequest:
  type: object
  required:
    - description
    - environments
    - version
  properties:
    description:
      type: string
      minLength: 1
      maxLength: 500
      description: Human readable description of the flag
    environments:
      $ref: '#/Environments'
    version:
      type: integer
      minimum: 1
      description: Current version of the flag (optimistic locking)

FlagResponse:
  type: object
  properties:
    flagKey:
      type: string
    description:
      type: string
    environments:
      $ref: '#/Environments'
    version:
      type: integer
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time

AuditResponse:
  type: object
  properties:
    id:
      type: integer
      format: int64
    flagKey:
      type: string
    version:
      type: integer
    action:
      type: string
      enum:
        - CREATED
        - UPDATED
        - DELETED
    changedBy:
      type: string
    changedAt:
      type: string
      format: date-time
    beforeState:
      type: string
      nullable: true
      description: JSON snapshot before change (null for CREATED)
    afterState:
      type: string
      nullable: true
      description: JSON snapshot after change (null for DELETED)